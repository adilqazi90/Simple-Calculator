<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A premium, accessible calculator with history and keyboard support." />
  <title>Calculus — Premium Calculator</title>

  <!-- Fonts: Syne (display) + JetBrains Mono (digits) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ░░ BACKGROUND TEXTURE ░░ -->
  <div class="bg-grid" aria-hidden="true"></div>

  <!-- ░░ APP SHELL ░░ -->
  <div class="app-shell">

    <!-- ── HEADER ── -->
    <header class="app-header">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="brand-name">Calculus</span>
      </div>
      <div class="header-actions">
        <!-- History toggle -->
        <button
          class="icon-btn"
          id="btn-history"
          aria-label="Toggle calculation history"
          aria-expanded="false"
          aria-controls="history-panel"
          title="History (H)"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
        <!-- Theme toggle -->
        <button
          class="icon-btn"
          id="btn-theme"
          aria-label="Toggle light/dark theme"
          title="Theme (T)"
        >
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ── MAIN LAYOUT ── -->
    <main class="main-layout" role="main">

      <!-- ── CALCULATOR CARD ── -->
      <section class="calc-card" aria-label="Calculator">

        <!-- Display -->
        <div class="display" role="region" aria-label="Calculator display" aria-live="polite" aria-atomic="true">
          <div class="display-expr" id="display-expr" aria-label="Expression"></div>
          <div class="display-main-wrap">
            <div class="display-main" id="display-main" aria-label="Current value">0</div>
            <button
              class="btn-copy"
              id="btn-copy"
              aria-label="Copy result to clipboard"
              title="Copy result"
              tabindex="0"
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                <rect x="9" y="9" width="13" height="13" rx="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              <span class="copy-label">Copy</span>
            </button>
          </div>
          <!-- Copy toast -->
          <div class="copy-toast" id="copy-toast" role="status" aria-live="polite">Copied!</div>
        </div>

        <!-- Keypad -->
        <div class="keypad" role="group" aria-label="Calculator buttons">

          <!-- Row 1: utility -->
          <button class="key key-utility" data-action="clear"      aria-label="Clear all (C)">C</button>
          <button class="key key-utility" data-action="sign"       aria-label="Toggle sign (+/-)">+/−</button>
          <button class="key key-utility" data-action="percent"    aria-label="Percentage">%</button>
          <button class="key key-op"      data-action="operator"
                  data-value="÷"          aria-label="Divide">÷</button>

          <!-- Row 2 -->
          <button class="key key-num"     data-action="digit"      data-value="7" aria-label="7">7</button>
          <button class="key key-num"     data-action="digit"      data-value="8" aria-label="8">8</button>
          <button class="key key-num"     data-action="digit"      data-value="9" aria-label="9">9</button>
          <button class="key key-op"      data-action="operator"
                  data-value="×"          aria-label="Multiply">×</button>

          <!-- Row 3 -->
          <button class="key key-num"     data-action="digit"      data-value="4" aria-label="4">4</button>
          <button class="key key-num"     data-action="digit"      data-value="5" aria-label="5">5</button>
          <button class="key key-num"     data-action="digit"      data-value="6" aria-label="6">6</button>
          <button class="key key-op"      data-action="operator"
                  data-value="−"          aria-label="Subtract">−</button>

          <!-- Row 4 -->
          <button class="key key-num"     data-action="digit"      data-value="1" aria-label="1">1</button>
          <button class="key key-num"     data-action="digit"      data-value="2" aria-label="2">2</button>
          <button class="key key-num"     data-action="digit"      data-value="3" aria-label="3">3</button>
          <button class="key key-op"      data-action="operator"
                  data-value="+"          aria-label="Add">+</button>

          <!-- Row 5: bottom row -->
          <button class="key key-num key-wide" data-action="digit" data-value="0" aria-label="0">0</button>
          <button class="key key-num"     data-action="decimal"    aria-label="Decimal point">.</button>
          <button class="key key-equals"  data-action="equals"     aria-label="Equals">=</button>

        </div>

        <!-- Backspace — floated above keypad -->
        <div class="backspace-row">
          <button class="key key-back" data-action="backspace" aria-label="Backspace, delete last character">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
              <line x1="18" y1="9" x2="12" y2="15"/>
              <line x1="12" y1="9" x2="18" y2="15"/>
            </svg>
          </button>
        </div>

      </section><!-- /calc-card -->

      <!-- ── HISTORY PANEL ── -->
      <aside
        class="history-panel"
        id="history-panel"
        role="complementary"
        aria-label="Calculation history"
        aria-hidden="true"
      >
        <div class="history-header">
          <h2 class="history-title">History</h2>
          <button class="text-btn" id="btn-clear-history" aria-label="Clear all history">Clear all</button>
        </div>
        <ol class="history-list" id="history-list" reversed aria-live="polite" aria-label="Past calculations">
          <li class="history-empty" id="history-empty">No history yet.</li>
        </ol>
      </aside>

    </main><!-- /main-layout -->

    <!-- ── KEYBOARD HINT ── -->
    <footer class="kbd-hint" aria-label="Keyboard shortcuts hint">
      <span>Keyboard ready</span>
      <span class="kbd">0–9</span>
      <span class="kbd">+ − * /</span>
      <span class="kbd">Enter</span>
      <span class="kbd">⌫</span>
      <span class="kbd">Esc</span>
    </footer>

  </div><!-- /app-shell -->

  <script src="script.js"></script>
</body>
</html>
